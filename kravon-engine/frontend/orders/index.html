<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Loading…</title>
  <meta name="description" id="pageDesc" content="">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">

  <!-- Shared styles -->
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/layout.css">
  <link rel="stylesheet" href="../shared/css/components.css">

  <!-- Orders-specific styles -->
  <link rel="stylesheet" href="assets/css/orders.css">
  <link rel="stylesheet" href="assets/css/cart.css">
  <link rel="stylesheet" href="assets/css/modal.css">

  <!-- SVG Sprite -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <symbol id="icon-cart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 5v14M5 12h14"/>
    </symbol>
    <symbol id="icon-wa" viewBox="0 0 24 24">
      <path fill="currentColor" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12"/>
    </symbol>
  </svg>
</head>
<body>
  <!--
    All content rendered by assets/js/renderer.js from config/config.js.
    To customise: edit config/config.js only.
  -->

  <!-- Demo banner -->
  <div class="demo-banner" id="demoBanner" aria-label="Demo notice"></div>

  <!-- App shell: renderer populates #app with nav + all 3 screens -->
  <div id="app"></div>

  <!-- Upgrade bridge: shown on ordering screen only -->
  <div class="upgrade" id="upgradeSection" style="display:none"></div>

  <!-- Footer -->
  <footer>
    <div class="footer-left" id="footerLeft"></div>
    <div class="footer-right">
      <span class="footer-note" id="footerNote"></span>
      <span class="footer-kravon" id="footerKravon"></span>
    </div>
  </footer>

  <!-- Mobile cart bar (ordering screen, mobile only) -->
  <div class="mobile-cart-bar" id="mobileCartBar" style="display:none" role="region" aria-label="Cart">
    <button class="mobile-cart-bar-inner" data-action="open-mobile-cart" aria-label="Open cart">
      <div class="mobile-cart-left">
        <span class="mobile-cart-count" id="mobileCartCount">0</span>
        <span class="mobile-cart-label">items in cart</span>
      </div>
      <span class="mobile-cart-total" id="mobileCartTotal">₹0</span>
    </button>
  </div>

  <!-- Cart overlay (mobile) -->
  <div class="cart-overlay" id="cartOverlay" aria-hidden="true"></div>

  <!-- Customisation modal -->
  <div class="modal-overlay" id="customModal"
       role="dialog" aria-modal="true" aria-labelledby="modalItemName" aria-hidden="true">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalItemName"></div>
          <div class="modal-price" id="modalItemPrice"></div>
        </div>
        <button class="modal-close" data-action="close-modal" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <span class="modal-section-label">Add-ons</span>
          <div id="modalAddons"></div>
        </div>
        <div class="modal-section">
          <span class="modal-section-label">Spice Level</span>
          <div class="spice-options" id="spiceOptions"></div>
        </div>
        <div class="modal-section">
          <span class="modal-section-label">Special Instructions</span>
          <input type="text" id="specialInput" class="form-input"
                 placeholder="e.g. no pickles, extra sauce…"
                 maxlength="120" autocomplete="off">
        </div>
      </div>
      <div class="modal-footer">
        <div class="modal-qty" role="group" aria-label="Quantity">
          <button class="modal-qty-btn" data-action="modal-qty-dec" aria-label="Decrease">−</button>
          <span class="modal-qty-num" id="modalQty" aria-live="polite">1</span>
          <button class="modal-qty-btn" data-action="modal-qty-inc" aria-label="Increase">+</button>
        </div>
        <button class="btn-primary modal-add-btn" id="modalAddBtn" data-action="modal-confirm">
          Add to Order
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <!-- Load order: shared → config → cart → renderer → modules → behaviour (last) -->
  <script src="../shared/js/kravon.js"></script>
  <script>
    // Injected by Vercel at build time; falls back to URL query params for local dev
    const _q = new URLSearchParams(window.location.search);
    const KRAVON_API_URL      = "__KRAVON_API_URL__"    !== "__KRAVON_API_URL__"    ? "__KRAVON_API_URL__"    : (_q.get('api')  || 'http://localhost:3000');
    const RESTAURANT_SLUG_ENV = "__RESTAURANT_SLUG__"   !== "__RESTAURANT_SLUG__"   ? "__RESTAURANT_SLUG__"   : _q.get('slug');
  </script>
  <script src="../api-client/kravon-api.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/renderer.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/behaviour.js"></script>
  <script src="assets/js/boot.js"></script>
</body>
</html>
