<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Test — Dine In Tables</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      text-align: center;
      padding: 20px;
      background: #0f0f0f;
      color: #f0f0f0;
    }
    h1 { margin-bottom: 4px; }
    .sub { color: #aaa; font-size: 0.9rem; margin-bottom: 24px; }
    .qr-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      margin: 16px 0;
    }
    .qr-card h2 { margin: 0 0 16px; font-size: 1rem; color: #c2d62a; }
    .qr-wrap { background: #fff; display: inline-block; padding: 12px; border-radius: 8px; }
    .url-label {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #666;
      word-break: break-all;
    }
    .open-link {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 18px;
      background: #c2d62a;
      color: #000;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>Spice of India</h1>
  <p class="sub">Dine-In QR Test Page — local dev</p>

  <div class="qr-card">
    <h2>Table T1 (UUID: e100…0001)</h2>
    <div class="qr-wrap">
      <div id="qr-t1"></div>
    </div>
    <p class="url-label" id="url-t1"></p>
    <a id="link-t1" class="open-link" target="_blank">Open in browser →</a>
  </div>

  <div class="qr-card">
    <h2>Table T2 (UUID: e100…0002)</h2>
    <div class="qr-wrap">
      <div id="qr-t2"></div>
    </div>
    <p class="url-label" id="url-t2"></p>
    <a id="link-t2" class="open-link" target="_blank">Open in browser →</a>
  </div>

  <script>
    const BASE   = 'http://localhost:8000';
    const SLUG   = 'spice-of-india';

    const tables = [
      { el: 'qr-t1', urlEl: 'url-t1', linkEl: 'link-t1', uuid: 'e1000000-0000-0000-0000-000000000001' },
      { el: 'qr-t2', urlEl: 'url-t2', linkEl: 'link-t2', uuid: 'e1000000-0000-0000-0000-000000000002' },
    ];

    tables.forEach(t => {
      const url = `${BASE}/tables/index.html?slug=${SLUG}&table_id=${t.uuid}`;
      new QRCode(document.getElementById(t.el), {
        text: url,
        width: 220,
        height: 220,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
      });
      document.getElementById(t.urlEl).textContent = url;
      document.getElementById(t.linkEl).href = url;
    });
  </script>
</body>
</html>
