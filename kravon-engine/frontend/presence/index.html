<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" id="pageDescription" content="">

  <!-- Presence base overrides -->
  <style>
    body { background: #080808; color: #F0EAE0; }
    footer { background: #080808; border-top: 1px solid rgba(255,255,255,0.07); }

  </style>

  <!-- Shared styles -->
  <link rel="stylesheet" href="../shared/css/base.css">
  <link rel="stylesheet" href="../shared/css/layout.css">
  <link rel="stylesheet" href="../shared/css/components.css">

  <!-- Presence-specific styles -->
  <link rel="stylesheet" href="assets/css/presence.css">
  <link rel="stylesheet" href="assets/css/cart.css">
  <link rel="stylesheet" href="assets/css/customization-modal.css">

<body>
  <!--
    All content is rendered by assets/js/renderer.js
    reading from config/config.js.
    To customise: edit config/config.js only.
  -->
  <div id="demoBanner" class="demo-banner" aria-label="Demo notice"></div>
  <div id="app"></div>
  <div id="upgradeSection" class="upgrade"></div>
  <footer>
    <div class="footer-left" id="footerLeft"></div>
    <div class="footer-right">
      <span class="footer-note" id="footerNote"></span>
      <span class="footer-kravon" id="footerKravon"></span>
    </div>
  </footer>

  <!-- Cart UI (presence has Razorpay checkout) -->
  <div class="cart-bar" id="cartBar" role="region" aria-label="Cart summary" aria-live="polite">
    <div class="cart-bar-left">
      <div class="cart-count" id="cartCount" aria-label="Items in cart">0</div>
      <div class="cart-summary">
        <strong id="cartBarTotal">₹0</strong>
        <span id="cartBarItems">0 items</span>
      </div>
    </div>
    <div class="cart-bar-right">
      <button class="cart-view-btn" data-action="open-cart" aria-label="View cart">View Cart</button>
      <button class="cart-wa-btn" data-action="checkout" aria-label="Proceed to checkout">
        Proceed to Checkout
      </button>
    </div>
  </div>

  <div class="cart-overlay" id="cartOverlay" aria-hidden="true"></div>

  <div class="cart-drawer" id="cartDrawer"
       role="dialog" aria-modal="true" aria-label="Your Order" aria-hidden="true">
    <div class="cart-drawer-head">
      <div class="cart-drawer-title">Your Order</div>
      <button class="cart-close" data-action="close-cart" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cartItemsList" aria-live="polite"></div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total-row">
        <span class="cart-total-label">Order Total</span>
        <span class="cart-total-val" id="cartTotalVal">₹0</span>
      </div>
      <p class="cart-min-note" id="cartMinNote"></p>
      <button class="cart-checkout-btn" data-action="checkout" aria-label="Proceed to checkout">
        Proceed to Checkout
      </button>
    </div>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <!-- Load order: shared → config → modules → renderer → behaviour -->
  <script src="../shared/js/kravon.js"></script>
  <script>
    // Injected by Vercel at build time; falls back to URL query params for local dev
    const _q = new URLSearchParams(window.location.search);
    const KRAVON_API_URL      = "__KRAVON_API_URL__"    !== "__KRAVON_API_URL__"    ? "__KRAVON_API_URL__"    : (_q.get('api')  || 'http://localhost:3000');
    const RESTAURANT_SLUG_ENV = "__RESTAURANT_SLUG__"   !== "__RESTAURANT_SLUG__"   ? "__RESTAURANT_SLUG__"   : _q.get('slug');
  </script>
  <script src="../api-client/kravon-api.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/enhanced-cart.js"></script>
  <script src="assets/js/customization-modal.js"></script>
  <script src="assets/js/renderer.js"></script>
  <script src="assets/js/behaviour.js"></script>
  <script src="assets/js/boot.js"></script>
</body>
</html>
