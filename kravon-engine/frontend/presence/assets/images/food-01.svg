<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7A4515"/>
      <stop offset="100%" stop-color="#1E0D05"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plateSh" cx="40%" cy="35%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="s"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#shine)"/>
  <!-- Plate shadow -->
  <ellipse cx="300" cy="338" rx="172" ry="28" fill="#000" opacity="0.35" filter="url(#s)"/>
  <!-- Plate -->
  <circle cx="300" cy="295" r="168" fill="#F2EAD8"/>
  <circle cx="300" cy="295" r="168" fill="url(#plateSh)"/>
  <circle cx="300" cy="295" r="148" fill="#FAFAF4"/>
  <circle cx="300" cy="295" r="145" fill="none" stroke="#E0D8C0" stroke-width="1.5"/>
  <!-- Food — biryani mound -->
  <ellipse cx="300" cy="308" rx="98"  ry="68"  fill="#C8921A"/>
  <ellipse cx="300" cy="294" rx="82"  ry="54"  fill="#D8A828"/>
  <ellipse cx="300" cy="283" rx="62"  ry="40"  fill="#EAC040"/>
  <ellipse cx="300" cy="275" rx="40"  ry="24"  fill="#F5D060" opacity="0.8"/>
  <!-- Rice grain texture -->
  <ellipse cx="272" cy="282" rx="7" ry="2.5" fill="#B87F15" opacity="0.55" transform="rotate(-18 272 282)"/>
  <ellipse cx="298" cy="270" rx="7" ry="2.5" fill="#B87F15" opacity="0.55" transform="rotate(8 298 270)"/>
  <ellipse cx="324" cy="278" rx="7" ry="2.5" fill="#B87F15" opacity="0.55" transform="rotate(-22 324 278)"/>
  <ellipse cx="308" cy="292" rx="6" ry="2"   fill="#B87F15" opacity="0.45" transform="rotate(28 308 292)"/>
  <ellipse cx="285" cy="296" rx="6" ry="2"   fill="#B87F15" opacity="0.45" transform="rotate(-10 285 296)"/>
  <!-- Saffron strands -->
  <path d="M278 272 Q300 258 322 272" stroke="#E07500" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M285 265 Q300 255 315 265" stroke="#FF9510" stroke-width="1.5" fill="none" opacity="0.55"/>
  <!-- Garnish dots -->
  <circle cx="302" cy="265" r="3" fill="#22A040" opacity="0.8"/>
  <circle cx="292" cy="270" r="2" fill="#22A040" opacity="0.6"/>
  <circle cx="313" cy="268" r="2" fill="#22A040" opacity="0.6"/>
  <!-- Fork -->
  <rect x="192" y="228" width="4" height="88" rx="2" fill="#B0A898"/>
  <rect x="188" y="228" width="2" height="33" rx="1" fill="#B0A898"/>
  <rect x="192" y="228" width="2" height="33" rx="1" fill="#B0A898"/>
  <rect x="196" y="228" width="2" height="33" rx="1" fill="#B0A898"/>
  <!-- Knife -->
  <rect x="408" y="228" width="4" height="88" rx="2" fill="#B0A898"/>
  <path d="M412 228 Q424 250 412 265" fill="#C8C0B0" opacity="0.7"/>
  <!-- Label -->
  <rect x="0" y="528" width="600" height="72" fill="rgba(0,0,0,0.58)"/>
  <text x="300" y="562" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="rgba(255,255,255,0.88)" letter-spacing="4" font-style="italic">Aromatic Biryani</text>
  <text x="300" y="584" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.38)" letter-spacing="5">PLACEHOLDER IMAGE</text>
</svg>
