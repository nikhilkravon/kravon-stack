<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4A2000"/>
      <stop offset="100%" stop-color="#100800"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plateSh" cx="40%" cy="35%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="s"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="grill"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#shine)"/>
  <!-- Plate shadow -->
  <ellipse cx="300" cy="338" rx="172" ry="28" fill="#000" opacity="0.35" filter="url(#s)"/>
  <!-- Plate — dark charcoal slate look -->
  <circle cx="300" cy="295" r="168" fill="#2A2520"/>
  <circle cx="300" cy="295" r="168" fill="url(#plateSh)"/>
  <circle cx="300" cy="295" r="150" fill="#302A24"/>
  <circle cx="300" cy="295" r="147" fill="none" stroke="#484038" stroke-width="1.5"/>
  <!-- Grilled meat pieces -->
  <!-- Piece 1 -->
  <rect x="248" y="272" width="68" height="36" rx="8" fill="#8B4513" transform="rotate(-12 282 290)"/>
  <rect x="248" y="272" width="68" height="36" rx="8" fill="#A0521A" opacity="0.7" transform="rotate(-12 282 290)"/>
  <!-- Grill marks -->
  <line x1="256" y1="274" x2="256" y2="300" stroke="#4A2008" stroke-width="3" opacity="0.8" transform="rotate(-12 282 290)"/>
  <line x1="264" y1="273" x2="264" y2="299" stroke="#4A2008" stroke-width="3" opacity="0.8" transform="rotate(-12 282 290)"/>
  <line x1="272" y1="272" x2="272" y2="298" stroke="#4A2008" stroke-width="3" opacity="0.8" transform="rotate(-12 282 290)"/>
  <!-- Char crust highlights -->
  <rect x="250" y="270" width="65" height="6" rx="3" fill="#FF8020" opacity="0.35" transform="rotate(-12 282 290)"/>
  <!-- Piece 2 -->
  <rect x="290" y="292" width="62" height="32" rx="7" fill="#903018" transform="rotate(8 321 308)"/>
  <rect x="290" y="292" width="62" height="32" rx="7" fill="#B04020" opacity="0.65" transform="rotate(8 321 308)"/>
  <line x1="297" y1="294" x2="297" y2="318" stroke="#4A1805" stroke-width="3" opacity="0.8" transform="rotate(8 321 308)"/>
  <line x1="305" y1="293" x2="305" y2="317" stroke="#4A1805" stroke-width="3" opacity="0.8" transform="rotate(8 321 308)"/>
  <line x1="313" y1="293" x2="313" y2="317" stroke="#4A1805" stroke-width="3" opacity="0.8" transform="rotate(8 321 308)"/>
  <rect x="292" y="290" width="58" height="5" rx="2.5" fill="#FF7018" opacity="0.32" transform="rotate(8 321 308)"/>
  <!-- Herb garnish -->
  <circle cx="284" cy="265" r="5"  fill="#22A040" opacity="0.85"/>
  <circle cx="296" cy="260" r="4"  fill="#1E9038" opacity="0.75"/>
  <circle cx="308" cy="263" r="3.5" fill="#28B048" opacity="0.7"/>
  <!-- Lemon wedge -->
  <path d="M332 270 Q348 260 356 278 Q350 290 334 285 Z" fill="#E8D020" opacity="0.8"/>
  <path d="M333 271 Q348 263 353 278 Q347 286 335 282 Z" fill="#F8E840" opacity="0.55"/>
  <!-- Fork -->
  <rect x="192" y="228" width="4" height="88" rx="2" fill="#888078"/>
  <rect x="188" y="228" width="2" height="33" rx="1" fill="#888078"/>
  <rect x="192" y="228" width="2" height="33" rx="1" fill="#888078"/>
  <rect x="196" y="228" width="2" height="33" rx="1" fill="#888078"/>
  <!-- Knife -->
  <rect x="408" y="228" width="4" height="88" rx="2" fill="#888078"/>
  <path d="M412 228 Q424 250 412 265" fill="#A09888" opacity="0.7"/>
  <!-- Label -->
  <rect x="0" y="528" width="600" height="72" fill="rgba(0,0,0,0.58)"/>
  <text x="300" y="562" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="rgba(255,255,255,0.88)" letter-spacing="4" font-style="italic">Grilled Speciality</text>
  <text x="300" y="584" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.38)" letter-spacing="5">PLACEHOLDER IMAGE</text>
</svg>
