<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6B1010"/>
      <stop offset="100%" stop-color="#180505"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plateSh" cx="40%" cy="35%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="s"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#shine)"/>
  <!-- Plate shadow -->
  <ellipse cx="300" cy="338" rx="172" ry="28" fill="#000" opacity="0.35" filter="url(#s)"/>
  <!-- Plate — deep bowl for curry -->
  <circle cx="300" cy="295" r="168" fill="#F2EAD8"/>
  <circle cx="300" cy="295" r="168" fill="url(#plateSh)"/>
  <circle cx="300" cy="295" r="150" fill="#FAF5EE"/>
  <!-- Bowl shape -->
  <ellipse cx="300" cy="310" rx="120" ry="80" fill="#C03018"/>
  <ellipse cx="300" cy="300" rx="108" ry="70" fill="#D83520"/>
  <ellipse cx="300" cy="293" rx="90"  ry="58" fill="#E84028"/>
  <!-- Curry surface texture -->
  <ellipse cx="278" cy="295" rx="22" ry="18" fill="#D02818" opacity="0.6"/>
  <ellipse cx="322" cy="288" rx="18" ry="15" fill="#C82010" opacity="0.55"/>
  <ellipse cx="298" cy="308" rx="16" ry="12" fill="#D02010" opacity="0.5"/>
  <!-- Oil shimmer -->
  <ellipse cx="285" cy="280" rx="12" ry="8" fill="#F8A030" opacity="0.35" transform="rotate(-20 285 280)"/>
  <ellipse cx="318" cy="298" rx="10" ry="6" fill="#F8A030" opacity="0.3"  transform="rotate(15 318 298)"/>
  <!-- Coriander garnish -->
  <circle cx="295" cy="275" r="4"  fill="#22A040" opacity="0.85"/>
  <circle cx="308" cy="270" r="3"  fill="#22A040" opacity="0.75"/>
  <circle cx="283" cy="270" r="3"  fill="#22A040" opacity="0.7"/>
  <circle cx="302" cy="282" r="2.5" fill="#22A040" opacity="0.6"/>
  <!-- Cream swirl -->
  <path d="M290 278 Q300 268 310 278 Q305 290 300 285 Q295 290 290 278Z" fill="#FFF8F0" opacity="0.55"/>
  <!-- Fork -->
  <rect x="192" y="228" width="4" height="88" rx="2" fill="#B0A898"/>
  <rect x="188" y="228" width="2" height="33" rx="1" fill="#B0A898"/>
  <rect x="192" y="228" width="2" height="33" rx="1" fill="#B0A898"/>
  <rect x="196" y="228" width="2" height="33" rx="1" fill="#B0A898"/>
  <!-- Knife -->
  <rect x="408" y="228" width="4" height="88" rx="2" fill="#B0A898"/>
  <path d="M412 228 Q424 250 412 265" fill="#C8C0B0" opacity="0.7"/>
  <!-- Label -->
  <rect x="0" y="528" width="600" height="72" fill="rgba(0,0,0,0.58)"/>
  <text x="300" y="562" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="rgba(255,255,255,0.88)" letter-spacing="4" font-style="italic">Signature Curry</text>
  <text x="300" y="584" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.38)" letter-spacing="5">PLACEHOLDER IMAGE</text>
</svg>
