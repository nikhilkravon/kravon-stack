<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kravon Catering — Premium corporate catering services with proposal engine.">
  <title id="pageTitle">Catering Services</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
/* ═══════════════════════════════════════════════════════════
   BASE.CSS — Design tokens, reset, typography, scroll reveal
   ═══════════════════════════════════════════════════════════ */

:root {
  /* Backgrounds */
  --bg-0:   #070706;
  --bg-1:   #0c0b09;
  --bg-2:   #111009;
  --bg-3:   #161512;
  --bg-4:   #1b1a16;

  /* Lines */
  --line:   rgba(255,255,255,0.065);
  --line2:  rgba(255,255,255,0.11);

  /* Text */
  --ink:    #f0ede6;
  --ink-60: rgba(240,237,230,0.6);
  --ink-35: rgba(240,237,230,0.35);
  --ink-18: rgba(240,237,230,0.18);

  /* Accent */
  --gold:        #c98d26;
  --gold-hi:     #dba040;
  --gold-lo:     #a87020;
  --gold-tint:   rgba(201,141,38,0.07);
  --gold-border: rgba(201,141,38,0.18);
  --gold-glow:   0 0 32px rgba(201,141,38,0.12);

  /* Lead tier colours */
  --tier-hot-border: rgba(220,80,50,0.3);
  --tier-hot-bg:     rgba(220,80,50,0.06);
  --tier-hot-color:  #e06040;

  /* WhatsApp */
  --wa-bg:     rgba(37,211,102,0.08);
  --wa-border: rgba(37,211,102,0.2);
  --wa-color:  #4cd97a;
  --wa-hover-bg:     rgba(37,211,102,0.14);
  --wa-hover-border: rgba(37,211,102,0.35);

  /* Error */
  --error-border: rgba(220,60,50,0.4);

  /* Fonts */
  --serif: 'Instrument Serif', Georgia, serif;
  --mono:  'DM Mono', 'Courier New', monospace;
  --sans:  'DM Sans', sans-serif;

  /* Spacing — 8-pt base */
  --s2: 2px;  --s4: 4px;  --s6: 6px;  --s8: 8px;
  --s12: 12px; --s16: 16px; --s20: 20px; --s24: 24px;
  --s28: 28px; --s32: 32px; --s40: 40px; --s48: 48px;
  --s56: 56px; --s64: 64px; --s80: 80px; --s96: 96px;
  --s112: 112px;

  /* Easing */
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── RESET ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; scroll-padding-top: 100px; }
body {
  background: var(--bg-0);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; appearance: none; }
img, svg { display: block; }
::selection { background: var(--gold-tint); color: var(--ink); }

/* ─── LAYOUT ─── */
.wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 32px;
}

/* ─── TYPOGRAPHY ─── */
.label {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 400;
  letter-spacing: 2.8px;
  text-transform: uppercase;
  color: var(--ink-35);
  display: block;
}
.label-gold { color: var(--gold); opacity: 0.85; }

h1, h2, h3, h4, h5, h6 { font-weight: 400; }

/* ─── SKELETON ─── */
body[data-loading="true"] { opacity: 0.5; pointer-events: none; }
body[data-error="true"] #app::after {
  content: 'Failed to load. Please refresh.';
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-2);
  padding: 30px;
  border: 1px solid var(--error-border);
  color: var(--ink-35);
  font-family: var(--mono);
  z-index: 9999;
}

/* ─── SCROLL REVEAL ─── */
.r { opacity: 0; transform: translateY(20px); }
.r.vis { animation: revealment 0.6s var(--ease-out) forwards; }
@keyframes revealment {
  to { opacity: 1; transform: translateY(0); }
}
.r.d1 { animation-delay: 0.05s; }
.r.d2 { animation-delay: 0.1s; }
.r.d3 { animation-delay: 0.15s; }
.r.d4 { animation-delay: 0.2s; }
.r.d5 { animation-delay: 0.25s; }
.r.d6 { animation-delay: 0.3s; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .wrap { padding: 0 20px; }
  html { font-size: 14px; }
}

/* ═══════════════════════════════════════════════════════════
   COMPONENTS.CSS — Buttons, cards, forms
   ═══════════════════════════════════════════════════════════ */

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--s8);
  padding: 12px 24px;
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 2.2px;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  white-space: nowrap;
  transition:
    background  0.2s var(--ease-in-out),
    color       0.2s var(--ease-in-out),
    transform   0.15s var(--ease-out),
    box-shadow  0.2s var(--ease-in-out);
}
.btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

.btn-gold { background: var(--gold); color: var(--bg-0); }
.btn-gold:hover {
  background: var(--gold-hi);
  transform: translateY(-1px);
  box-shadow: var(--gold-glow);
}
.btn-gold:active { transform: translateY(0); box-shadow: none; }

.btn-ghost {
  background: transparent;
  color: var(--ink-35);
  padding-left: 0;
  padding-right: 0;
}
.btn-ghost:hover { color: var(--ink); }

/* ─── PACKAGE CARDS ─── */
.pkg {
  background: var(--bg-3);
  display: flex;
  flex-direction: column;
  position: relative;
  transition: background 0.22s var(--ease-in-out);
}
.pkg:hover { background: var(--bg-4); }

.pkg.pkg-featured { background: rgba(201,141,38,0.035); }
.pkg.pkg-featured:hover { background: rgba(201,141,38,0.06); }

.pkg-stamp {
  position: absolute;
  top: 0; right: 0;
  background: var(--gold);
  color: var(--bg-0);
  font-family: var(--mono);
  font-size: 7.5px;
  letter-spacing: 2.2px;
  text-transform: uppercase;
  padding: 4px 10px;
}
.pkg-head {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--line);
}
.pkg-tier {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.75;
  display: block;
  margin-bottom: var(--s8);
}
.pkg-name {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.5px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: var(--s6);
}
.pkg-scope {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.5px;
  color: var(--ink-35);
  line-height: 1.5;
}
.pkg-price-block {
  padding: 18px 24px;
  border-bottom: 1px solid var(--line);
}
.pkg-price-lbl {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--ink-18);
  display: block;
  margin-bottom: var(--s4);
}
.pkg-price {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -0.8px;
  color: var(--ink);
  line-height: 1.1;
}
.pkg-price-unit {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--ink-35);
  margin-left: var(--s4);
}
.pkg-body { padding: 20px 24px; flex: 1; }
.pkg-incl-lbl {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--ink-18);
  display: block;
  margin-bottom: 14px;
}
.pkg-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.pkg-list li {
  font-size: 12.5px;
  color: var(--ink-35);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.5;
}
.pkg-list li::before {
  content: '—';
  font-family: var(--mono);
  font-size: 8.5px;
  color: rgba(201,141,38,0.4);
  flex-shrink: 0;
  margin-top: 3px;
}
.pkg-foot { padding: 16px 24px; border-top: 1px solid var(--line); }
.pkg-btn {
  width: 100%;
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 1px solid var(--line2);
  color: var(--ink-35);
  background: transparent;
  cursor: pointer;
  transition:
    border-color 0.2s,
    color 0.2s,
    background 0.2s,
    box-shadow 0.2s;
}
.pkg-btn:hover {
  border-color: var(--gold-border);
  color: var(--gold);
  background: var(--gold-tint);
}
.pkg-featured .pkg-btn {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--bg-0);
  font-weight: 500;
}
.pkg-featured .pkg-btn:hover {
  background: var(--gold-hi);
  border-color: var(--gold-hi);
  box-shadow: var(--gold-glow);
}

/* ─── TESTIMONIALS ─── */
.testi-card {
  background: var(--bg-3);
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.testi-mark {
  position: absolute;
  top: 12px; left: 20px;
  font-family: var(--serif);
  font-size: 60px;
  line-height: 0.7;
  color: rgba(201,141,38,0.12);
  pointer-events: none;
}
.testi-quote {
  font-size: 15px;
  line-height: 1.85;
  color: var(--ink-60);
  margin-bottom: 28px;
  flex: 1;
}
.testi-byline {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.testi-name {
  font-family: var(--serif);
  font-size: 13.5px;
  color: var(--ink);
}
.testi-role {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-35);
}
.testi-deal {
  font-size: 11px;
  color: var(--gold);
  opacity: 0.8;
}

/* ─── FORM PILLS ─── */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: var(--s12);
}
.pill {
  display: flex;
  align-items: center;
}
.pill input[type="radio"],
.pill input[type="checkbox"] {
  margin: 0;
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 1px solid var(--gold-border);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
  margin-right: 8px;
}
.pill input[type="radio"]:checked,
.pill input[type="checkbox"]:checked {
  background: var(--gold);
  border-color: var(--gold);
}
.pill label {
  cursor: pointer;
  font-size: 13.5px;
  color: var(--ink-60);
  user-select: none;
}
.pill input:checked + label {
  color: var(--ink);
  font-weight: 500;
}

/* ─── DATE FIELDS ─── */
.date-pair {
  display: flex;
  gap: var(--s20);
  margin-bottom: var(--s12);
}
.date-field {
  flex: 1;
}
.date-field-lbl {
  display: block;
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--ink-18);
  margin-bottom: var(--s8);
}
.date-field input[type="date"] {
  width: 100%;
  padding: 9px 12px;
  font-family: var(--sans);
  font-size: 13.5px;
  background: var(--bg-2);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 2px;
  transition: border-color 0.2s;
}
.date-field input[type="date"]:focus {
  outline: none;
  border-color: var(--gold);
}
.date-field input[type="date"]:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.date-duration {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.2s;
}
.date-duration.visible {
  opacity: 1;
}

/* ─── FORM ENGINE ─── */
.f-block {
  margin-bottom: var(--s28);
}
.f-lbl {
  display: block;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--ink-35);
  margin-bottom: var(--s12);
}
.f-lbl-note {
  font-weight: 400;
  opacity: 0.7;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s20);
}
.field-row.single {
  grid-template-columns: 1fr;
}
.field {
  display: flex;
  flex-direction: column;
}
.field label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-35);
  margin-bottom: var(--s8);
}
.field input,
.field textarea {
  padding: 10px 12px;
  font-family: var(--sans);
  font-size: 13.5px;
  background: var(--bg-2);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 2px;
  transition: border-color 0.2s;
}
.field input:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--gold);
}
.field textarea {
  resize: vertical;
  min-height: 100px;
}
.field.has-error input,
.field.has-error textarea {
  border-color: var(--error-border);
  animation: shake 0.3s;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.req-star {
  color: var(--gold);
}

.f-submit {
  display: flex;
  align-items: center;
  gap: var(--s24);
  justify-content: space-between;
}
.f-submit-note {
  font-size: 11px;
  color: var(--ink-35);
  line-height: 1.6;
}

/* ─── CONFIRM STATE ─── */
.f-confirm {
  padding: 40px 32px;
  background: rgba(201,141,38,0.04);
  border: 1px solid var(--gold-border);
  border-radius: 2px;
}
.confirm-ref {
  display: block;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 2.2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: var(--s16);
}
.confirm-tier-row {
  display: flex;
  align-items: baseline;
  gap: var(--s20);
  margin-bottom: var(--s24);
}
.confirm-tier {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink);
}
.confirm-tier[data-tier="hot"] {
  color: var(--tier-hot-color);
}
.confirm-sla {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-35);
}
.confirm-h {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: var(--s20);
}
.confirm-body {
  font-size: 14px;
  color: var(--ink-60);
  line-height: 1.7;
  margin-bottom: var(--s28);
}
.confirm-steps {
  margin-bottom: var(--s24);
}
.confirm-steps-lbl {
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2.2px;
  text-transform: uppercase;
  color: var(--ink-35);
  margin-bottom: var(--s12);
}
.confirm-step-list {
  display: flex;
  flex-direction: column;
  gap: var(--s12);
}
.confirm-step {
  font-size: 13.5px;
  color: var(--ink-60);
  padding-left: 20px;
  position: relative;
}
.confirm-step::before {
  content: '';
  position: absolute;
  left: 0; top: 6px;
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
}
.confirm-wa {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  background: var(--wa-bg);
  border: 1px solid var(--wa-border);
  border-radius: 2px;
  color: var(--wa-color);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition:
    background 0.2s,
    border-color 0.2s;
}
.confirm-wa:hover {
  background: var(--wa-hover-bg);
  border-color: var(--wa-hover-border);
}

/* ─── FAQ ACCORDION ─── */
.faq-item {
  border-bottom: 1px solid var(--line);
}
.faq-q {
  width: 100%;
  padding: 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: none;
  border: none;
  cursor: pointer;
  transition: color 0.2s;
}
.faq-q:hover { color: var(--gold); }
.faq-q-txt {
  flex: 1;
  text-align: left;
  font-family: var(--serif);
  font-size: 15.5px;
  color: var(--ink-60);
}
.faq-icon {
  flex-shrink: 0;
  font-size: 24px;
  transition: transform 0.3s var(--ease-out);
}
.faq-item.open .faq-icon {
  transform: rotate(45deg);
}
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s var(--ease-out);
}
.faq-item.open .faq-a {
  max-height: 500px;
}
.faq-a-inner {
  padding-bottom: 24px;
  font-size: 13.5px;
  color: var(--ink-35);
  line-height: 1.8;
}

/* ═══════════════════════════════════════════════════════════
   LAYOUT.CSS — Sections
   ═══════════════════════════════════════════════════════════ */

/* ─── NAV ─── */
.nav {
  position: sticky;
  top: 0;
  z-index: 500;
  height: 56px;
  background: rgba(7,7,6,0.94);
  backdrop-filter: blur(32px);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  gap: var(--s16);
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: var(--s16);
  flex-shrink: 1;
  min-width: 0;
}
.nav-name {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--ink);
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-rule { width: 1px; height: 16px; background: var(--line2); flex-shrink: 0; }
.nav-category {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.7;
  white-space: nowrap;
}

/* ─── HERO ─── */
.hero {
  background: var(--bg-1);
  padding: 80px 0 0;
  position: relative;
  overflow: hidden;
}
.hero-glow {
  position: absolute;
  top: -120px; right: -60px;
  width: 600px; height: 600px;
  background: radial-gradient(ellipse at center, rgba(201,141,38,0.055) 0%, transparent 68%);
  pointer-events: none;
}
.hero-copy { padding-bottom: 64px; }
.hero-eyebrow {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 2.8px;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.75;
  display: block;
  margin-bottom: var(--s20);
}
.hero-h1 {
  font-family: var(--serif);
  font-size: clamp(48px, 6vw, 80px);
  font-weight: 400;
  line-height: 0.98;
  letter-spacing: -2px;
  color: var(--ink);
  margin-bottom: var(--s24);
}
.hero-h1 em { font-style: italic; color: var(--gold); }
.hero-sub {
  font-size: 14.5px;
  line-height: 1.82;
  color: var(--ink-35);
  margin-bottom: var(--s40);
}
.hero-actions { display: flex; align-items: center; gap: var(--s20); flex-wrap: wrap; }
.hero-panel {
  display: grid;
  grid-template-columns: repeat(4, 1fr) 2fr;
  gap: 1px;
  background: var(--line);
  border-top: 1px solid var(--line);
}
.h-stat {
  background: var(--bg-3);
  padding: 20px 18px;
  transition: background 0.2s;
}
.h-stat:hover { background: var(--bg-4); }
.h-stat-n {
  font-family: var(--serif);
  font-size: 32px;

(function() {
  'use strict';

  function scrollTo(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const offset = 100;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: top, behavior: 'smooth' });
  }

  document.addEventListener('click', function(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    switch (action) {
      case 'scroll-proposal':
        scrollTo('proposal');
        break;
      case 'scroll-packages':
        scrollTo('packages');
        break;
      case 'switch-menu':
        switchMenu(btn.dataset.menuId, btn);
        break;
      case 'toggle-faq':
        toggleFaq(btn);
        break;
      case 'submit-form':
        submitForm();
        break;
    }
  });

  function switchMenu(id, btn) {
    document.querySelectorAll('.menu-panel').forEach(p => {
      p.classList.remove('active');
    });
    document.querySelectorAll('.menu-tab').forEach(t => {
      t.classList.remove('active');
    });
    const panel = document.getElementById('menu-' + id);
    if (panel) panel.classList.add('active');
    if (btn) btn.classList.add('active');
  }

  function toggleFaq(btn) {
    const item = btn.closest('.faq-item');
    const isOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item.open').forEach(el => {
      el.classList.remove('open');
    });
    if (!isOpen) item.classList.add('open');
  }

  function setFormState(state) {
    const engine = document.getElementById('formEngine');
    if (!engine) return;
    engine.dataset.state = state;
    setTimeout(() => {
      engine.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  function markError(fieldId) {
    const el = document.getElementById(fieldId);
    if (!el) return;
    el.classList.add('has-error');
    setTimeout(() => { el.classList.remove('has-error'); }, 2500);
  }

  function submitForm() {
    const name = (document.getElementById('fname').value || '').trim();
    const company = (document.getElementById('fcompany').value || '').trim();
    const email = (document.getElementById('femail').value || '').trim();
    const phone = (document.getElementById('fphone').value || '').trim();
    const budget = document.querySelector('input[name="budget"]:checked');
    const pax = document.querySelector('input[name="pax"]:checked');
    const type = document.querySelector('input[name="type"]:checked');

    let valid = true;
    [['ff-name', name], ['ff-company', company], ['ff-email', email], ['ff-phone', phone]]
      .forEach(f => {
        if (!f[1]) { valid = false; markError(f[0]); }
      });
    if (!valid) return;

    // Budget redirect check
    if (budget) {
      const budgetCfg = (CONFIG.form.budgetOptions || []).filter(b => b.value === budget.value)[0];
      if (budgetCfg && budgetCfg.redirect) {
        setFormState('redirect');
        return;
      }
    }

    // Show confirmation
    const ref = 'CAT-' + Date.now().toString().slice(-6);
    const tierLabels = { hot: '🔥 Hot lead', warm: '◎ Warm lead', cool: '○ Standard' };
    const tier = 'warm';

    document.getElementById('confirmRef').textContent = 'Ref · ' + ref;
    document.getElementById('confirmTier').textContent = tierLabels[tier];
    document.getElementById('confirmTier').dataset.tier = tier;
    document.getElementById('confirmSla').textContent = 'Proposal within 24–48 business hours';

    setFormState('confirm');
  }

  function initDatePickers() {
    const startEl = document.getElementById('feventstart');
    const endEl = document.getElementById('feventend');
    const durEl = document.getElementById('fduration');
    if (!startEl || !endEl) return;

    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);
    startEl.setAttribute('min', todayStr);

    startEl.addEventListener('change', function() {
      const val = startEl.value;
      if (!val) {
        endEl.value = '';
        endEl.disabled = true;
        if (durEl) { durEl.textContent = ''; durEl.classList.remove('visible'); }
        return;
      }
      const minEnd = new Date(val);
      minEnd.setDate(minEnd.getDate() + 1);
      endEl.setAttribute('min', minEnd.toISOString().slice(0, 10));
      endEl.disabled = false;
      if (endEl.value && endEl.value <= val) {
        endEl.value = '';
        if (durEl) { durEl.textContent = ''; durEl.classList.remove('visible'); }
      } else if (endEl.value) {
        updateDuration();
      }
    });

    endEl.addEventListener('change', updateDuration);

    function updateDuration() {
      if (!startEl.value || !endEl.value || !durEl) return;
      const ms = new Date(endEl.value) - new Date(startEl.value);
      const days = Math.round(ms / 86400000);
      if (days > 0) {
        durEl.textContent = days === 1 ? '1 day' : days + ' days';
        durEl.classList.add('visible');
      }
    }
  }

  function initReveal() {
    const revealEls = Array.from(document.querySelectorAll('.r'));
    function showEl(el) { el.classList.add('vis'); }
    function checkViewport() {
      const vh = window.innerHeight;
      revealEls.forEach(el => {
        if (!el.classList.contains('vis')) {
          const rect = el.getBoundingClientRect();
          if (rect.top < vh + 80) showEl(el);
        }
      });
    }
    if ('IntersectionObserver' in window) {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { showEl(e.target); obs.unobserve(e.target); }
        });
      }, { threshold: 0, rootMargin: '0px 0px -20px 0px' });
      revealEls.forEach(el => { obs.observe(el); });
    }
    window.addEventListener('scroll', checkViewport, { passive: true });
    [60, 250, 700].forEach(t => { setTimeout(checkViewport, t); });
  }

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function animateCount(el, target) {
    let start = null;
    function frame(ts) {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / 1200, 1);
      el.textContent = Math.round(easeOut(progress) * target);
      if (progress < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function initCounters() {
    if (!('IntersectionObserver' in window)) return;
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const target = parseInt(e.target.getAttribute('data-target'), 10);
          if (!isNaN(target)) animateCount(e.target, target);
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('[data-target]').forEach(el => { obs.observe(el); });
  }

  function initBehaviour() {
    initReveal();
    initCounters();
    initDatePickers();
  }

  window.initBehaviour = initBehaviour;
})();

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════

(function() {
  'use strict';
  function boot() {
    if (typeof window.mount === 'function') {
      window.mount();
    }
    if (typeof window.initBehaviour === 'function') {
      window.initBehaviour();
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => { setTimeout(boot, 0); });
  } else {
    setTimeout(boot, 0);
  }
})();
